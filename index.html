<!DOCTYPE html>
<html lang="fa">

<head>
<meta charset="UTF-8">
<title>پرایس مانی</title>

<style>

body{
    margin:0;
    font-family:Tahoma;
    background:#40a157;
    direction:rtl;
}

/* منو */
.navbar{
    background:#40a15c;
    padding:20px;
    text-align:center;
    position:sticky;
    top:0;
}

.navbar a{
    color:white;
    margin:0 10px;
    text-decoration:none;
    font-weight:bold;
}

/* بنر */
.header{
    background:#2d6a4f;
    height:250px;
}

/* سکشن */
.section{
    background:white;
    width:80%;
    margin:20px auto;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    text-align:center;
}

/* کارت‌ها */
.courses{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    background:white;
    flex:1;
    min-width:200px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 6px 20px rgba(0,0,0,0.15);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:60px;
    height:60px;
    object-fit:contain;
    margin-bottom:10px;
}

.card-link{
    text-decoration:none;
    color:inherit;
    flex:1;
}

.footer{
    background:#0f172a;
    color:white;
    text-align:center;
    padding:25px;
    margin-top:40px;
}

</style>

</head>

<body>

<div class="navbar">
    <a href="#about">درباره من</a>
    <a href="#courses">آموزش‌ها</a>
    <a href="#contact">تماس</a>
</div>

<div class="section" id="about">
    <h2>پرایس مانی</h2>
    <p>سبک ترکیبی اسمارت مانی و پرایس اکشن</p>
</div>

<div class="section" id="courses">

<h2>آموزش‌ها</h2>

<div class="courses">

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/2331/2331944.png">
        <h3>Price Action</h3>
        <p>درک رفتار قیمت</p>
    </div>

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/2331/2331950.png">
        <h3>Smart Money</h3>
        <p>ردیابی پول هوشمند</p>
    </div>

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">
        <h3>Psychology</h3>
        <p>کنترل ذهن در ترید</p>
    </div>

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png">
        <h3>Robot Mode</h3>
        <p>سیستم معاملاتی</p>
    </div>

</div>

</div>

<div class="section" id="contact">
    <h2>تماس</h2>
    <p>email: korosh@example.com</p>
</div>

<div class="footer">
© 2026 Price Mani
</div>

</body>
</html>
